name: hyperfin-server
# ---------------------------------------------------------------------------
# Databases
#
# `db` is a Managed PostgreSQL 16 database (production: true, $15/mo basic).
# We originally tried the $7/mo Dev tier, but DO App Platform provisions dev
# DBs with a locked-down `db` user that has no CREATE privilege anywhere —
# schema bootstrap always fails with "permission denied for database db",
# and doadmin credentials aren't exposed for app-attached dev DBs. Managed
# tier fixes this (doadmin accessible in dashboard), adds automated backups,
# and is required for Plaid Production's security review regardless.
#
# The DATABASE_URL env var below uses DO App Platform's component-binding
# syntax (${db.DATABASE_URL}) so the connection string is auto-injected and
# rotated by the platform — no manual secret management.
# ---------------------------------------------------------------------------
databases:
  - name: db
    engine: PG
    version: "16"
    production: true
    cluster_name: hyperfin-db
# ---------------------------------------------------------------------------
# App-Level secrets — declared here WITHOUT values so future spec applies
# don't wipe them. DO's spec-apply is authoritative: any key not present in
# the spec is deleted from App-Level on update. Declaring with `type: SECRET`
# and no value preserves the existing App-Level encrypted value. Values are
# set once via the DO dashboard and rotated there.
# ---------------------------------------------------------------------------
envs:
  - key: JWT_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: JWT_REFRESH_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: PLAID_TOKEN_ENCRYPTION_KEY
    scope: RUN_TIME
    type: SECRET
  - key: PLAID_CLIENT_ID
    scope: RUN_TIME
    type: SECRET
  - key: PLAID_SECRET
    scope: RUN_TIME
    type: SECRET
  - key: ANTHROPIC_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: ADMIN_BEARER_TOKEN
    scope: RUN_TIME
    type: SECRET
  - key: S3_BUCKET
    scope: RUN_TIME
    type: SECRET
  - key: S3_ACCESS_KEY_ID
    scope: RUN_TIME
    type: SECRET
  - key: S3_SECRET_ACCESS_KEY
    scope: RUN_TIME
    type: SECRET
  - key: S3_ENDPOINT
    scope: RUN_TIME
    type: SECRET
services:
  - name: api
    github:
      repo: grepman07/HyperFin
      branch: main
      deploy_on_push: true
    source_dir: Server
    dockerfile_path: Server/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
    # -----------------------------------------------------------------------
    # Only NON-SECRET config lives in this spec (checked into git).
    #
    # All SECRETS are managed at App-Level via the DO dashboard and must
    # NOT be redeclared here — `type: SECRET` with no value would overwrite
    # the App-Level secret with an empty string on spec apply. The secrets
    # managed at App-Level are:
    #   - JWT_SECRET, JWT_REFRESH_SECRET, PLAID_TOKEN_ENCRYPTION_KEY
    #   - PLAID_CLIENT_ID, PLAID_SECRET (added when Plaid approves us)
    #   - ANTHROPIC_API_KEY, ADMIN_BEARER_TOKEN
    #   - S3_BUCKET, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, S3_ENDPOINT
    # -----------------------------------------------------------------------
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ALLOWED_ORIGINS
        value: "*"
      # Auto-injected by the `db` component declared in `databases:` above.
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: PLAID_ENV
        scope: RUN_TIME
        value: "sandbox"
      - key: SERVER_URL
        scope: RUN_TIME
        value: "https://hyperfin-server-dzlsx.ondigitalocean.app"
      # R2 region (plain value — AWS/Spaces users override in dashboard).
      - key: S3_REGION
        scope: RUN_TIME
        value: "auto"
      - key: S3_PREFIX
        scope: RUN_TIME
        value: "prod/telemetry/"
