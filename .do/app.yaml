name: hyperfin-server
services:
  - name: api
    github:
      repo: grepman07/HyperFin
      branch: main
      deploy_on_push: true
    source_dir: Server
    dockerfile_path: Server/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ALLOWED_ORIGINS
        value: "*"
      # Required by /v1/chat/stream (cloud chat tier, opt-in only).
      # The actual secret value must be set via the Digital Ocean dashboard
      # or `doctl apps update` before the first deploy that references it.
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      # S3-compatible training-data uploader — hourly flush of local JSONL
      # files to a durable bucket. DO's container filesystem is ephemeral,
      # so without these variables every redeploy would drop unflushed
      # telemetry rows.
      #
      # Default target is Cloudflare R2 (free tier covers HyperFin's scale).
      # The same env vars work with Backblaze B2, AWS S3, and DO Spaces —
      # just point S3_ENDPOINT at the provider's URL (or unset for AWS).
      #
      # If S3_BUCKET / S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY is missing,
      # the uploader no-ops with a warning and the server keeps running on
      # local JSONL only. See Server/docs/training-data-export.md for the
      # full setup walkthrough.
      - key: S3_BUCKET
        scope: RUN_TIME
        type: SECRET
      - key: S3_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: S3_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      # R2 endpoint URL — looks like https://<account-id>.r2.cloudflarestorage.com
      # Treat as secret because it leaks the Cloudflare account ID.
      - key: S3_ENDPOINT
        scope: RUN_TIME
        type: SECRET
      # Region: R2 expects "auto"; AWS S3 / Spaces want the real region.
      - key: S3_REGION
        scope: RUN_TIME
        value: "auto"
      # Object key prefix inside the bucket (plain value, not a secret).
      - key: S3_PREFIX
        scope: RUN_TIME
        value: "prod/telemetry/"
      # Bearer token for the /v1/admin/telemetry/* download endpoints.
      # Generate a long random value (32+ bytes) — e.g. `openssl rand -hex 32`.
      - key: ADMIN_BEARER_TOKEN
        scope: RUN_TIME
        type: SECRET
